# Render Blueprint for in_sight. Render reads this when you create a "Blueprint"
# from the repo. Runs the Flask app via waitress with an in-process sync
# (INSIGHT_BG_SYNC) so no separate cron service is needed.
#
# FREE tier: $0/mo, but (1) the service sleeps after ~15 min idle (~50s cold start
# on next open) and (2) storage is ephemeral — the SQLite cache resets on restart,
# so the display self-heals via sync but manually-logged /log health readings don't
# persist. For always-warm + persisted readings, switch `plan: free` -> `starter`
# and add back a disk (that's the ~$7.25/mo setup).
#
# Secrets (passwords, API key) are `sync: false` — set them in the dashboard.
services:
  - type: web
    name: in-sight
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT server.app:app
    healthCheckPath: /api/health
    envVars:
      - key: TZ
        value: Asia/Kolkata                   # ← your timezone, so calendar times + day/now are local (not UTC)
      - key: INSIGHT_DB
        value: /tmp/insight.db                # writable ephemeral path (no disk on free)
      - key: INSIGHT_BG_SYNC
        value: "1"                            # run sync in-process (no cron service)
      - key: INSIGHT_SYNC_SECONDS
        value: "900"                          # refresh dVerse + life every 15 min
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: INSIGHT_SECRET_KEY
        generateValue: true                   # signs the login session cookie
      - key: INSIGHT_PASSWORD
        sync: false                           # ← set in dashboard (your screen password)
      - key: INSIGHT_DVERSE_PASSWORD
        sync: false                           # ← set in dashboard
      - key: ANTHROPIC_API_KEY
        sync: false                           # ← set in dashboard (optional, for the wizard)
      - key: GCAL_ICAL_PERSONAL
        sync: false                           # ← secret iCal link for your personal calendar
      - key: GCAL_ICAL_WORK
        sync: false                           # ← secret iCal link for your work calendar
