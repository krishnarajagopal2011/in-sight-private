# ─────────────────────────────────────────────────────────────────────────────
# FOOD KNOWLEDGE  ·  100% VEGAN  ·  rebuilt from knowledge/meal-plan.md
# ─────────────────────────────────────────────────────────────────────────────
# Goal: lower HbA1c 9% → 6%, then Type-2 remission. ~180P / 150C / 75F / 55 fibre.
# Low-GI, anti-inflammatory; muscle + testosterone support. NOT medical advice.

targets: {protein_g: 180, carbs_g: 150, fat_g: 75, fiber_g: 55, calories: 1980}

soak_by: "19:00"
prep_anchor: "Eat veg→protein→starch · 1 tbsp ACV before lunch & dinner · 10–15 min walk after each main meal."

guidance:
  - "Order every meal: veg/salad & fibre first → protein & fat → starchy carb last."
  - "Walk 10–15 min after breakfast, lunch and dinner."
  - "1 tbsp apple cider vinegar in water before lunch & dinner."
  - "Carbs ~150 g, low-GI only — no juice, white rice, sugar, maida, sweets."
  - "Front-load carbs to morning/training; lightest dinner at 18:30 for a 13–14 h fast."
  - "Soaked fenugreek + cinnamon daily; sprout dals 1–2 days ahead."

# Supplements + meds, taken `minutes_before` the named meal. The Life screen shows
# a timed "take now" card, computed from that day's actual meal time (so it tracks
# whatever time breakfast/dinner lands at). Skipped on days without that meal.
supplements:
  - meal: "Breakfast"
    minutes_before: 30
    items: ["Zomelis D 10", "Glycomet GP 0.5", "Vit B12", "Ashwagandha", "Q10", "Vilvam ×3", "Madhumegam ×2"]
  - meal: "Dinner"
    minutes_before: 30
    items: ["Glycomet GP 0.5", "Magnesium", "Zinc Picolinate", "Vilvam ×1", "Madhumegam ×2"]

# ── Groceries & prep — so nothing runs out and there's no "what do I make?" ──────
# Lunch & dinner mains come from the Auroville solar kitchen; this covers the HOME
# staples (breakfast, snacks, soaks, shakes) + supplements. ⚠️ Edit to your reality —
# changes here flow straight to the screen.
groceries:
  day: saturday          # shopping day — the list shows as a checklist that day
  time: "10:00"
  categories:
    "Proteins & dals": ["Tofu", "Tempeh", "Moong (to sprout)", "Chana / chickpeas", "Rajma", "Toor + masoor dal", "MyPro protein powder", "Edamame", "Peanuts"]
    "Produce": ["Spinach / greens", "Seasonal veg", "Lemons", "Apples / pears", "Tomatoes", "Cucumber", "Curry leaves"]
    "Nuts & seeds": ["Almonds", "Walnuts", "Pumpkin seeds", "Hemp seeds", "Ground flax"]
    "Pantry": ["Oat milk (unsweetened)", "Fenugreek (methi) seeds", "Cinnamon", "Apple cider vinegar", "Millet / ragi", "Turmeric", "Black pepper", "Tahini / olive oil"]
    "Supplements": ["Zomelis D 10", "Glycomet GP 0.5", "Vit B12", "Ashwagandha", "Q10", "Vilvam", "Madhumegam", "Magnesium", "Zinc picolinate"]

# Exact prep, at the right time — removes the decision so you stay on-plan. (Evening
# soak + morning steam-dal/shake live in the soak + house cards; this adds the rest.)
meal_prep:
  - {time: "07:45", title: "Pack for the kitchen",
     items: ["Carry protein (MyPro / tofu / edamame) to add at the solar kitchen — lunch & dinner"]}
  - {day: saturday, time: "17:00", title: "Weekly batch prep",
     items: ["Pressure-cook a batch of dal + chole (2–3 days)", "Sprout a big jar of moong / chana", "Portion tofu & tempeh"]}

soak_tonight_default: &soak "1 tsp methi (fenugreek) for tomorrow's morning water · keep moong sprouting (1–2 days ahead)"

# ── PHASE 1 KICKSTART (intensive, ~1200 kcal) — shown when health.yaml phase: 1 ──
# ⚠️ Only run once your doctor has adjusted Glimepiride & SGLT2 meds.
kickstart:
  targets: {protein_g: 140, carbs_g: 80, fat_g: 35, fiber_g: 45, calories: 1200}
  soak_tonight: *soak
  meals:
    - {name: "Early morning", time: "05:00", items: ["Soaked fenugreek water", "5 almonds"],
       protein_g: 2, carbs_g: 2, fat_g: 5, fiber_g: 2, calories: 61}
    - {name: "Breakfast", time: "08:00", note: "post-lift (lighter in Phase 1)",
       items: ["1.5 scoops MyPro + 150 ml oat milk", "1 tbsp ground flax", "cinnamon"],
       protein_g: 40, carbs_g: 18, fat_g: 9, fiber_g: 5, calories: 313}
    - {name: "Mid-morning", time: "10:00", items: ["1 small fruit (½ cup berries / 1 guava)"],
       protein_g: 1, carbs_g: 10, fat_g: 1, fiber_g: 4, calories: 53}
    - {name: "Lunch", time: "12:30", note: "ACV first · veg→protein, NO grain · 10-min walk after",
       items: ["200 g tofu", "1 bowl dal", "large non-starchy salad (no grain)"],
       protein_g: 40, carbs_g: 18, fat_g: 13, fiber_g: 14, calories: 349}
    - {name: "Evening", time: "16:30", items: ["1 scoop MyPro", "1 cup sprouted moong"],
       protein_g: 32, carbs_g: 18, fat_g: 2, fiber_g: 9, calories: 218}
    - {name: "Dinner", time: "18:30", note: "ACV first · 10-min walk after",
       items: ["1 millet idli", "1 bowl sambhar", "½ cup edamame", "sautéed greens"],
       protein_g: 25, carbs_g: 16, fat_g: 5, fiber_g: 11, calories: 209}

