# ── Saturday refuel rotation ─────────────────────────────────────────────────
# A different theme each week (same ~180P/150C/75F target). The morning/breakfast/
# mid/evening meals are shared (YAML anchors); the lunch & dinner mains vary.
variants:
  saturday:
    - label: "South Indian refuel"
      soak_tonight: *soak
      meals:
        - &sat_early {name: "Early morning", time: "05:00", items: ["Soaked fenugreek water", "10 almonds", "1 tbsp pumpkin seeds"], protein_g: 5, carbs_g: 4, fat_g: 10, fiber_g: 3, calories: 126}
        - &sat_break {name: "Breakfast", time: "08:00", items: ["1.5 scoops MyPro + 150 ml oat milk", "2 tbsp hemp seeds", "1 tbsp ground flax", "cinnamon"], protein_g: 51, carbs_g: 22, fat_g: 19, fiber_g: 6, calories: 463}
        - &sat_mid {name: "Mid-morning", time: "10:00", items: ["6 walnuts", "1 small pear"], protein_g: 5, carbs_g: 14, fat_g: 13, fiber_g: 4, calories: 193}
        - {name: "Lunch", time: "12:30", note: "ACV first · veg→protein→starch · 10-min walk after", items: ["200 g tofu", "0.5 bowl rajma", "1 bowl dal", "salad (¼ cup brown rice optional)"], protein_g: 44, carbs_g: 48, fat_g: 19, fiber_g: 19, calories: 539}
        - &sat_eve {name: "Evening", time: "17:00", items: ["1.5 scoops MyPro", "1.5 cups sprouted moong + handful peanuts"], protein_g: 51, carbs_g: 32, fat_g: 4, fiber_g: 13, calories: 368}
        - {name: "Dinner", time: "18:30", note: "ACV first · 10-min walk after", items: ["1–2 small millet idli", "1 bowl sambhar", "tofu", "sautéed green beans"], protein_g: 22, carbs_g: 30, fat_g: 9, fiber_g: 15, calories: 289}
    - label: "Mediterranean bowl"
      soak_tonight: *soak
      meals:
        - *sat_early
        - *sat_break
        - *sat_mid
        - {name: "Lunch", time: "12:30", note: "ACV first · veg→protein→starch · 10-min walk after", items: ["Baked falafel (chickpea)", "quinoa tabbouleh", "hummus", "big Greek salad + EVOO"], protein_g: 44, carbs_g: 48, fat_g: 19, fiber_g: 19, calories: 539}
        - *sat_eve
        - {name: "Dinner", time: "18:30", note: "ACV first · 10-min walk after", items: ["Grilled tofu / tempeh", "roasted veg (zucchini, peppers)", "½ cup quinoa", "tahini drizzle"], protein_g: 22, carbs_g: 30, fat_g: 9, fiber_g: 15, calories: 289}
    - label: "East Asian"
      soak_tonight: *soak
      meals:
        - *sat_early
        - *sat_break
        - *sat_mid
        - {name: "Lunch", time: "12:30", note: "ACV first · veg→protein→starch · 10-min walk after", items: ["Tofu & edamame stir-fry", "mixed veg", "½ cup millet / soba", "sesame"], protein_g: 44, carbs_g: 48, fat_g: 19, fiber_g: 19, calories: 539}
        - *sat_eve
        - {name: "Dinner", time: "18:30", note: "ACV first · 10-min walk after", items: ["Tempeh (low-sugar teriyaki)", "bok choy + broccoli", "½ cup brown rice"], protein_g: 22, carbs_g: 30, fat_g: 9, fiber_g: 15, calories: 289}
