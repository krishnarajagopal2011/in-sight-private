# Goal: lower HbA1c 9% в†’ 6%, then Type-2 remission. ~180P / 150C / 75F / 55 fibre.
# Low-GI, anti-inflammatory; muscle + testosterone support. NOT medical advice.

targets: {protein_g: 180, carbs_g: 150, fat_g: 75, fiber_g: 55, calories: 1980}

soak_by: "19:00"
prep_anchor: "Eat vegв†’proteinв†’starch В· 1 tbsp ACV before lunch & dinner В· 10вЂ“15 min walk after each main meal."

guidance:
  - "Order every meal: veg/salad & fibre first в†’ protein & fat в†’ starchy carb last."
  - "Walk 10вЂ“15 min after breakfast, lunch and dinner."
  - "1 tbsp apple cider vinegar in water before lunch & dinner."
  - "Carbs ~150 g, low-GI only вЂ” no juice, white rice, sugar, maida, sweets."
  - "Front-load carbs to morning/training; lightest dinner at 18:30 for a 13вЂ“14 h fast."
  - "Soaked fenugreek + cinnamon daily; sprout dals 1вЂ“2 days ahead."

# Supplements + meds, taken `minutes_before` the named meal. The Life screen shows
# a timed "take now" card, computed from that day's actual meal time (so it tracks
# whatever time breakfast/dinner lands at). Skipped on days without that meal.
supplements:
  - meal: "Breakfast"
    minutes_before: 30
    items: ["Zomelis D 10", "Glycomet GP 0.5", "Vit B12", "Ashwagandha", "Q10", "Vilvam Г—3", "Madhumegam Г—2"]
  - meal: "Dinner"
    minutes_before: 30
    items: ["Glycomet GP 0.5", "Magnesium", "Zinc Picolinate", "Vilvam Г—1", "Madhumegam Г—2"]

soak_tonight_default: &soak "1 tsp methi (fenugreek) for tomorrow's morning water В· keep moong sprouting (1вЂ“2 days ahead)"

# в”Ђв”Ђ PHASE 1 KICKSTART (intensive, ~1200 kcal) вЂ” shown when health.yaml phase: 1 в”Ђв”Ђ
# вљ пёЏ Only run once your doctor has adjusted Glimepiride & SGLT2 meds.
kickstart:
